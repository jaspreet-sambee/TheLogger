<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390">
  <title>TheLogger — Share Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 390px; height: 844px; overflow: hidden;
      background: #0C0A08;
      color: #F2EDE8;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      position: relative; display: flex; flex-direction: column; align-items: center;
    }
    /* Film grain — heavier for cinematic feel */
    body::before {
      content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    /* Cinematic vignette */
    .vignette {
      position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 42%, rgba(0,0,0,0.78) 100%);
    }
    /* Warm coral radial glow — behind skeleton */
    .glow {
      position: absolute; top: 32%; left: 50%; transform: translate(-50%,-50%);
      width: 400px; height: 400px; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse, rgba(245,87,62,0.18) 0%, rgba(245,87,62,0.06) 35%, transparent 65%);
    }
    /* Subtle warm floor gradient */
    .floor {
      position: absolute; bottom: 0; left: 0; right: 0; height: 280px; z-index: 1; pointer-events: none;
      background: linear-gradient(0deg, rgba(20,14,8,0.6) 0%, transparent 100%);
    }
    .dynamic-island {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 88px; height: 28px; background: #000; border-radius: 20px; z-index: 20;
    }
    .status-bar {
      width: 100%; height: 54px; display: flex; align-items: flex-end;
      justify-content: space-between; padding: 0 24px 10px; position: relative; z-index: 10; opacity: 0.55;
    }
    .status-time { font-size: 15px; font-weight: 600; }
    .status-icons svg { fill: #F2EDE8; }
    .nav {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px 10px; position: relative; z-index: 10;
    }
    .nav-close { font-size: 16px; color: rgba(242,237,232,0.4); font-weight: 600; }
    .share-btn {
      background: rgba(245,87,62,0.14); border: 1px solid rgba(245,87,62,0.32);
      border-radius: 20px; padding: 8px 18px; color: #F5573E;
      font-size: 13px; font-weight: 800; font-family: inherit;
      box-shadow: inset 0 1px 0 rgba(255,150,130,0.1);
    }

    /* Skeleton */
    .skel-wrap {
      flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 2;
    }

    /* Stats card */
    .stats-card {
      position: relative; z-index: 10; text-align: center; padding: 0 28px 40px; width: 100%;
    }
    .pr-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(232,168,51,0.14); border: 1px solid rgba(232,168,51,0.38);
      border-radius: 20px; padding: 6px 18px; margin-bottom: 16px;
      box-shadow: 0 0 24px rgba(232,168,51,0.12);
    }
    .pr-pill-text {
      font-size: 11px; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase; color: #E8A833;
    }
    .ex-name {
      font-size: 12px; font-weight: 800; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(242,237,232,0.45); margin-bottom: 6px;
    }
    .weight {
      font-size: 80px; font-weight: 900; letter-spacing: -5px; line-height: 0.85; color: #F2EDE8;
    }
    .reps { font-size: 24px; font-weight: 700; color: #F5573E; margin: 8px 0 8px; }
    .one-rm { font-size: 14px; color: rgba(242,237,232,0.38); margin-bottom: 26px; font-weight: 500; }
    .divider { width: 32px; height: 1px; background: rgba(245,87,62,0.35); margin: 0 auto 16px; }
    .branding {
      font-size: 11px; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(242,237,232,0.15);
    }
    .date-str {
      position: absolute; bottom: 96px; right: 26px; font-size: 11px;
      color: rgba(242,237,232,0.18); z-index: 10; letter-spacing: 0.04em; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="dynamic-island"></div>
  <div class="glow"></div>
  <div class="floor"></div>
  <div class="vignette"></div>
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons"><svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="16" height="7" rx="1.5" fill="#F2EDE8"/></svg></div>
  </div>
  <div class="nav">
    <span class="nav-close">✕</span>
    <span class="share-btn">Share ↑</span>
  </div>
  <div class="skel-wrap">
    <!-- Bench press skeleton — person lying back, arms pressing up -->
    <svg width="240" height="290" viewBox="0 0 240 290" fill="none" xmlns="http://www.w3.org/2000/svg"
         style="opacity:0.65;filter:drop-shadow(0 0 14px rgba(245,87,62,0.6))">
      <!-- Head -->
      <circle cx="120" cy="42" r="22" stroke="#F5573E" stroke-width="2.5"/>
      <!-- Torso (horizontal — lying position) -->
      <line x1="120" y1="64" x2="120" y2="128" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Shoulders bar -->
      <line x1="54" y1="92" x2="186" y2="92" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Left arm — raised up pressing -->
      <line x1="54" y1="92" x2="30" y2="44" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="44" x2="22" y2="24" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Right arm — raised up pressing -->
      <line x1="186" y1="92" x2="210" y2="44" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="210" y1="44" x2="218" y2="24" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Hips bar -->
      <line x1="84" y1="128" x2="156" y2="128" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Left leg (bent at knee) -->
      <line x1="84" y1="128" x2="68" y2="208" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="68" y1="208" x2="54" y2="256" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Right leg (bent at knee) -->
      <line x1="156" y1="128" x2="172" y2="208" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="172" y1="208" x2="186" y2="256" stroke="#F5573E" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Barbell bar -->
      <line x1="0" y1="22" x2="240" y2="22" stroke="rgba(245,87,62,0.55)" stroke-width="4" stroke-linecap="round"/>
      <!-- Weight plates -->
      <rect x="4" y="10" width="14" height="24" rx="3" stroke="rgba(245,87,62,0.45)" stroke-width="2" fill="none"/>
      <rect x="222" y="10" width="14" height="24" rx="3" stroke="rgba(245,87,62,0.45)" stroke-width="2" fill="none"/>
      <!-- Joint dots -->
      <circle cx="54" cy="92" r="5" fill="#F5573E" opacity="0.9"/>
      <circle cx="186" cy="92" r="5" fill="#F5573E" opacity="0.9"/>
      <circle cx="30" cy="44" r="4" fill="#F5573E" opacity="0.8"/>
      <circle cx="210" cy="44" r="4" fill="#F5573E" opacity="0.8"/>
      <circle cx="84" cy="128" r="5" fill="#F5573E" opacity="0.9"/>
      <circle cx="156" cy="128" r="5" fill="#F5573E" opacity="0.9"/>
      <circle cx="68" cy="208" r="4.5" fill="#F5573E" opacity="0.85"/>
      <circle cx="172" cy="208" r="4.5" fill="#F5573E" opacity="0.85"/>
    </svg>
  </div>
  <div class="stats-card">
    <div class="pr-pill"><span>🏆</span><span class="pr-pill-text">New Personal Record</span></div>
    <div class="ex-name">Bench Press</div>
    <div class="weight">190</div>
    <div class="reps">lbs &nbsp;×&nbsp; 5 reps</div>
    <div class="one-rm">Est. 1RM &nbsp;·&nbsp; 224 lbs</div>
    <div class="divider"></div>
    <div class="branding">TheLogger</div>
  </div>
  <div class="date-str">Mar 25, 2026</div>
</body>
</html>
